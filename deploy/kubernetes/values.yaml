replicaCount: 1

image:
  repository: claw-studio-server
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 18797

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: claw.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

server:
  host: 0.0.0.0
  port: 18797

targetArchitecture: x64
acceleratorProfile: cpu

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
