[package]
name = "sdkwork-claw-desktop"
version = "0.1.0"
edition = "2021"

[lib]
name = "sdkwork_claw_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dependencies]
axum = "0.8"
dirs = "6.0.0"
hub-installer-rs = { path = "vendor/hub-installer/rust" }
image = { version = "0.25", default-features = false, features = ["png"] }
jsonwebtoken = "9.3"
json5 = "0.4"
postgres = "0.19.12"
reqwest = { version = "0.12", default-features = false, features = ["http2", "rustls-tls"] }
rusqlite = { version = "0.39.0", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sysinfo = "0.33"
sys-locale = "0.3"
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
tauri-plugin-single-instance = "2"
time = { version = "0.3", features = ["formatting"] }
tokio = { version = "1", features = ["rt-multi-thread", "sync", "net", "time"] }
toml_edit = "0.22"
uuid = { version = "1", features = ["v4"] }
xcap = "0.9.3"

[dev-dependencies]
tempfile = "3"

[target.'cfg(windows)'.dependencies]
windows-service = "0.8.0"
winreg = "0.52"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
strip = "symbols"
