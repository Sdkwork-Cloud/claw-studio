schemaVersion: "1.0"
$schema: "../../schemas/hub-installer.manifest.schema.json"
metadata:
  name: "OpenClaw Install (pnpm)"
  version: "2026.03.08"
  description: "Install OpenClaw via pnpm global package."
  homepage: "https://docs.openclaw.ai/install"
platforms:
  - windows
  - macos
  - ubuntu
variables:
  openclaw_channel: "latest"
  openclaw_onboard: "true"
defaults:
  sudo: true
  timeoutMs: 1200000
  env:
    SHARP_IGNORE_GLOBAL_LIBVIPS: "1"
lifecycle:
  preflight:
    - id: "show-openclaw-pnpm-profile-unix"
      shell: bash
      when:
        platforms: [macos, ubuntu]
      run: "echo OpenClaw profile=pnpm channel={{openclaw_channel}} onboard={{openclaw_onboard}}"
    - id: "show-openclaw-pnpm-profile-win"
      shell: powershell
      when:
        platforms: [windows]
      run: "Write-Host \"OpenClaw profile=pnpm channel={{openclaw_channel}} onboard={{openclaw_onboard}}\""
  healthcheck:
    - id: "openclaw-pnpm-version"
      run: "openclaw --version"
    - id: "openclaw-pnpm-doctor"
      run: "openclaw doctor --non-interactive"
      continueOnError: true
artifacts:
  - id: "openclaw-install-pnpm"
    type: "command"
    commands:
      - id: "install-openclaw-pnpm"
        run: "pnpm add -g openclaw@{{openclaw_channel}}"
      - id: "approve-openclaw-builds-unix"
        shell: bash
        when:
          platforms: [macos, ubuntu]
        run: "pnpm approve-builds -g || true"
      - id: "approve-openclaw-builds-win"
        shell: powershell
        when:
          platforms: [windows]
        run: |
          try {
            pnpm approve-builds -g
          } catch {
            Write-Host "pnpm approve-builds returned non-zero; continuing."
          }
      - id: "openclaw-pnpm-onboard-unix"
        shell: bash
        when:
          platforms: [macos, ubuntu]
        run: |
          if [ "{{openclaw_onboard}}" = "true" ]; then
            openclaw onboard --install-daemon
          fi
      - id: "openclaw-pnpm-onboard-win"
        shell: powershell
        when:
          platforms: [windows]
        run: |
          if ("{{openclaw_onboard}}" -eq "true") {
            openclaw onboard --install-daemon
          }
