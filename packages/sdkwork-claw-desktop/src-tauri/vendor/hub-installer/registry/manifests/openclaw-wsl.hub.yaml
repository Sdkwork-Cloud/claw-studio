schemaVersion: "1.0"
$schema: "../../schemas/hub-installer.manifest.schema.json"
metadata:
  name: "OpenClaw Install (WSL)"
  version: "2026.03.19"
  description: "Install OpenClaw inside WSL from a Windows host."
  homepage: "https://docs.openclaw.ai/install"
platforms:
  - windows
variables:
  hub_software_name: "openclaw"
  hub_install_control_level: "partial"
  openclaw_channel: "latest"
  openclaw_onboard: "false"
defaults:
  sudo: false
  timeoutMs: 1800000
dependencies:
  - id: "node"
    description: "Node.js is required inside WSL before OpenClaw can be installed."
    check:
      type: "command"
      name: "node"
    install:
      - id: "install-node-wsl"
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates
          curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
          sudo apt-get install -y nodejs
  - id: "pnpm"
    description: "pnpm is required inside WSL before OpenClaw can be installed."
    check:
      type: "command"
      name: "pnpm"
    install:
      - id: "install-pnpm-wsl"
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
lifecycle:
  preflight:
    - id: "openclaw-wsl-preflight"
      shell: powershell
      run: |
        if (-not (Get-Command wsl.exe -ErrorAction SilentlyContinue)) {
          throw "WSL is not available on this Windows host."
        }
        wsl.exe --status
  healthcheck:
    - id: "openclaw-wsl-health"
      shell: powershell
      run: |
        $wslArgs = @()
        if (-not [string]::IsNullOrWhiteSpace("{{hub_wsl_distribution}}")) {
          $wslArgs += "--distribution"
          $wslArgs += "{{hub_wsl_distribution}}"
        }
        $wslArgs += "--"
        $wslArgs += "bash"
        $wslArgs += "-lc"
        $script = @'
        set -euo pipefail
        command -v openclaw >/dev/null 2>&1
        openclaw --version
        openclaw doctor --non-interactive || true
        '@
        & wsl.exe @wslArgs $script
  uninstall:
    - id: "openclaw-wsl-uninstall"
      shell: powershell
      run: |
        $wslArgs = @()
        if (-not [string]::IsNullOrWhiteSpace("{{hub_wsl_distribution}}")) {
          $wslArgs += "--distribution"
          $wslArgs += "{{hub_wsl_distribution}}"
        }
        $wslArgs += "--"
        $wslArgs += "bash"
        $wslArgs += "-lc"
        $script = @'
        set -euo pipefail
        if command -v pnpm >/dev/null 2>&1; then
          pnpm remove -g openclaw || pnpm uninstall -g openclaw || true
        elif command -v npm >/dev/null 2>&1; then
          npm uninstall -g openclaw || true
        fi
        '@
        & wsl.exe @wslArgs $script
artifacts:
  - id: "openclaw-install-wsl"
    type: "command"
    commands:
      - id: "install-openclaw-wsl"
        shell: powershell
        run: |
          $wslArgs = @()
          if (-not [string]::IsNullOrWhiteSpace("{{hub_wsl_distribution}}")) {
            $wslArgs += "--distribution"
            $wslArgs += "{{hub_wsl_distribution}}"
          }
          $wslArgs += "--"
          $wslArgs += "bash"
          $wslArgs += "-lc"
          $script = @'
          set -euo pipefail
          if ! command -v node >/dev/null 2>&1; then
            if ! command -v apt-get >/dev/null 2>&1; then
              echo "Node.js is required inside WSL." >&2
              exit 1
            fi
            export DEBIAN_FRONTEND=noninteractive
            sudo apt-get update
            sudo apt-get install -y curl ca-certificates
            curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi
          if ! command -v pnpm >/dev/null 2>&1; then
            corepack enable
            corepack prepare pnpm@latest --activate
          fi
          pnpm add -g openclaw@{{openclaw_channel}}
          if [ "{{openclaw_onboard}}" = "true" ]; then
            openclaw onboard --install-daemon
          fi
          '@
          & wsl.exe @wslArgs $script
