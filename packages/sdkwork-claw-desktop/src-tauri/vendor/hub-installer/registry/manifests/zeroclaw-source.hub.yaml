schemaVersion: "1.0"
$schema: "../../schemas/hub-installer.manifest.schema.json"
metadata:
  name: "ZeroClaw Install (Source)"
  version: "2026.03.19"
  description: "Clone or update the official ZeroClaw repository and install it through Cargo."
  homepage: "https://github.com/zeroclaw-labs/zeroclaw"
platforms:
  - windows
  - macos
  - ubuntu
variables:
  hub_software_name: "zeroclaw"
  hub_install_control_level: "managed"
  repo_url: "https://github.com/zeroclaw-labs/zeroclaw.git"
  destination: "{{hub_work_root}}/zeroclaw"
defaults:
  sudo: false
  timeoutMs: 3600000
dependencies:
  - id: "git"
    check:
      type: "command"
      name: "git"
  - id: "cargo"
    check:
      type: "command"
      name: "cargo"
artifacts:
  - id: "zeroclaw-source"
    type: "git"
    repository: "{{repo_url}}"
    destination: "{{destination}}"
    strategy: "clone-or-pull"
    build:
      - run: "cargo install --path . --locked --force --root \"{{hub_install_root}}\""
        cwd: "{{destination}}"
        when:
          fileExists: "{{destination}}/Cargo.toml"
lifecycle:
  preflight:
    - id: "show-zeroclaw-source-profile-unix"
      shell: bash
      when:
        platforms: [macos, ubuntu]
      run: "echo ZeroClaw profile=source repo={{repo_url}} destination={{destination}}"
    - id: "show-zeroclaw-source-profile-win"
      shell: powershell
      when:
        platforms: [windows]
      run: "Write-Host \"ZeroClaw profile=source repo={{repo_url}} destination={{destination}}\""
  healthcheck:
    - id: "zeroclaw-source-git"
      run: "git -C {{destination}} rev-parse --is-inside-work-tree"
    - id: "zeroclaw-source-version-unix"
      shell: bash
      when:
        platforms: [macos, ubuntu]
      run: "\"{{hub_install_root}}/bin/zeroclaw\" --version"
    - id: "zeroclaw-source-version-win"
      shell: powershell
      when:
        platforms: [windows]
      run: "& \"{{hub_install_root}}\\bin\\zeroclaw.exe\" --version"
