schemaVersion: "1.0"
$schema: "../../schemas/hub-installer.manifest.schema.json"
metadata:
  name: "OpenClaw Install (npm)"
  version: "2026.03.08"
  description: "Install OpenClaw via npm global package."
  homepage: "https://docs.openclaw.ai/install"
platforms:
  - windows
  - macos
  - ubuntu
variables:
  openclaw_channel: "latest"
  openclaw_onboard: "true"
defaults:
  sudo: true
  timeoutMs: 1200000
  env:
    SHARP_IGNORE_GLOBAL_LIBVIPS: "1"
lifecycle:
  preflight:
    - id: "show-openclaw-npm-profile-unix"
      shell: bash
      when:
        platforms: [macos, ubuntu]
      run: "echo OpenClaw profile=npm channel={{openclaw_channel}} onboard={{openclaw_onboard}}"
    - id: "show-openclaw-npm-profile-win"
      shell: powershell
      when:
        platforms: [windows]
      run: "Write-Host \"OpenClaw profile=npm channel={{openclaw_channel}} onboard={{openclaw_onboard}}\""
  healthcheck:
    - id: "openclaw-npm-version"
      run: "openclaw --version"
    - id: "openclaw-npm-doctor"
      run: "openclaw doctor --non-interactive"
      continueOnError: true
artifacts:
  - id: "openclaw-install-npm"
    type: "command"
    commands:
      - id: "install-openclaw-npm"
        run: "npm install -g openclaw@{{openclaw_channel}}"
      - id: "openclaw-npm-onboard-unix"
        shell: bash
        when:
          platforms: [macos, ubuntu]
        run: |
          if [ "{{openclaw_onboard}}" = "true" ]; then
            openclaw onboard --install-daemon
          fi
      - id: "openclaw-npm-onboard-win"
        shell: powershell
        when:
          platforms: [windows]
        run: |
          if ("{{openclaw_onboard}}" -eq "true") {
            openclaw onboard --install-daemon
          }

