schemaVersion: "1.0"
$schema: "../../schemas/hub-installer.manifest.schema.json"
metadata:
  name: "OpenClaw Install (Ansible)"
  version: "2026.03.08"
  description: "Install OpenClaw using the openclaw-ansible automation repository."
  homepage: "https://docs.openclaw.ai/install/ansible"
platforms:
  - macos
  - ubuntu
variables:
  hub_software_name: "openclaw"
  hub_install_control_level: "opaque"
  openclaw_ansible_dir: "{{hub_work_root}}/ansible"
defaults:
  sudo: true
  timeoutMs: 1800000
lifecycle:
  preflight:
    - id: "show-openclaw-ansible-profile"
      shell: bash
      run: "echo OpenClaw profile=ansible ansible_dir={{openclaw_ansible_dir}}"
  healthcheck:
    - id: "openclaw-ansible-health"
      shell: bash
      run: |
        set -euo pipefail
        test -d "{{openclaw_ansible_dir}}"
artifacts:
  - id: "openclaw-ansible-install-unix"
    type: "command"
    commands:
      - id: "setup-openclaw-ansible-unix"
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v git >/dev/null 2>&1; then
            echo "git is required for ansible install."
            exit 1
          fi
          if [ ! -d "{{openclaw_ansible_dir}}/.git" ]; then
            git clone https://github.com/openclaw/openclaw-ansible.git "{{openclaw_ansible_dir}}"
          fi
          cd "{{openclaw_ansible_dir}}"
          if [ -x ./install.sh ]; then
            ./install.sh
          else
            curl -fsSL https://raw.githubusercontent.com/openclaw/openclaw-ansible/main/install.sh | bash
          fi
