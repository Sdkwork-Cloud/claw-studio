schemaVersion: "1.0"
$schema: "../../schemas/hub-installer.manifest.schema.json"
metadata:
  name: "OpenClaw Install (Podman)"
  version: "2026.03.08"
  description: "Install OpenClaw with setup-podman.sh for rootless Podman deployment."
  homepage: "https://docs.openclaw.ai/install/podman"
platforms:
  - macos
  - ubuntu
variables:
  hub_software_name: "openclaw"
  hub_install_control_level: "opaque"
  openclaw_source_dir: "{{hub_work_root}}"
defaults:
  sudo: true
  timeoutMs: 1800000
lifecycle:
  preflight:
    - id: "show-openclaw-podman-profile"
      shell: bash
      run: "echo OpenClaw profile=podman source_dir={{openclaw_source_dir}}"
  healthcheck:
    - id: "openclaw-podman-health"
      shell: bash
      run: |
        set -euo pipefail
        command -v podman >/dev/null 2>&1
        podman ps || true
artifacts:
  - id: "openclaw-podman-install-unix"
    type: "command"
    commands:
      - id: "setup-openclaw-podman-unix"
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v git >/dev/null 2>&1; then
            echo "git is required for podman install."
            exit 1
          fi
          if [ ! -d "{{openclaw_source_dir}}/.git" ]; then
            git clone https://github.com/openclaw/openclaw.git "{{openclaw_source_dir}}"
          fi
          cd "{{openclaw_source_dir}}"
          ./setup-podman.sh
