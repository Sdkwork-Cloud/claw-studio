schemaVersion: "1.0"
$schema: "../../schemas/hub-installer.manifest.schema.json"
metadata:
  name: "Git Install"
  version: "1.0.0"
  description: "Install Git via platform package manager."
platforms:
  - windows
  - macos
  - ubuntu
defaults:
  sudo: true
  timeoutMs: 300000
artifacts:
  - id: "git-package"
    type: "package"
    install:
      byPlatform:
        windows:
          source: "winget://Git.Git"
        macos:
          source: "brew://git"
        ubuntu:
          source: "apt://git"
lifecycle:
  healthcheck:
    - run: "git --version"

