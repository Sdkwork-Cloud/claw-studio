[package]
name = "hub-installer-rs"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Rust implementation of the hub-installer manifest and registry driven software installer"
repository = "https://example.invalid/hub-installer"

[lib]
name = "hub_installer_rs"
path = "src/lib.rs"

[[bin]]
name = "hub-installer-rs"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5.39", features = ["derive"] }
dirs = "6.0.0"
reqwest = { version = "0.12.15", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
serde_yaml = "0.9.34"
sha2 = "0.10.9"
tempfile = "3.20.0"
thiserror = "2.0.12"
time = { version = "0.3.41", features = ["formatting"] }
url = "2.5.4"
wait-timeout = "0.2.1"
which = "8.0.0"

[dev-dependencies]
pretty_assertions = "1.4.1"
