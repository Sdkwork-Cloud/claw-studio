[package]
name = "sdkwork-claw-server"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.8"
sdkwork-claw-host-core = { path = "../../sdkwork-claw-host-core/src-host" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }
