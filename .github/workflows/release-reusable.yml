name: reusable-release

on:
  workflow_call:
    inputs:
      release_profile:
        description: Release profile id defined under scripts/release/release-profiles.mjs
        required: true
        type: string
      release_tag:
        description: Existing release tag to publish
        required: true
        type: string
      git_ref:
        description: Git ref to build; defaults to refs/tags/<release_tag>
        required: false
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

concurrency:
  group: release-${{ inputs.release_profile }}-${{ inputs.release_tag }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SDKWORK_SHARED_SDK_MODE: git
  SDKWORK_SHARED_SDK_GIT_REF: main
  SDKWORK_SHARED_SDK_APP_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-sdk-app.git
  SDKWORK_SHARED_SDK_COMMON_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-sdk-commons.git

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.plan.outputs.release_tag }}
      git_ref: ${{ steps.plan.outputs.git_ref }}
      product_name: ${{ steps.plan.outputs.product_name }}
      release_name: ${{ steps.plan.outputs.release_name }}
      desktop_matrix: ${{ steps.plan.outputs.desktop_matrix }}
      server_matrix: ${{ steps.plan.outputs.server_matrix }}
      container_matrix: ${{ steps.plan.outputs.container_matrix }}
      kubernetes_matrix: ${{ steps.plan.outputs.kubernetes_matrix }}
      manifest_file_name: ${{ steps.plan.outputs.manifest_file_name }}
      global_checksums_file_name: ${{ steps.plan.outputs.global_checksums_file_name }}
    steps:
      - name: Checkout workflow sources
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || format('refs/tags/{0}', inputs.release_tag) }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Resolve release plan
        id: plan
        shell: bash
        run: |
          node scripts/release/resolve-release-plan.mjs --profile ${{ inputs.release_profile }} --release-tag "${{ inputs.release_tag }}" --git-ref "${{ inputs.git_ref }}" --github-output

  verify-release:
    name: Verify release inputs
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2t64 \
            libgbm-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            librsvg2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            rpm \
            patchelf

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Run release verification
        shell: bash
        run: |
          pnpm lint
          pnpm check:desktop
          pnpm check:server
          cargo test --manifest-path packages/sdkwork-claw-desktop/src-tauri/Cargo.toml
          pnpm build
          pnpm server:build
          pnpm docs:build

  desktop-release:
    name: Desktop release (${{ matrix.platform }}-${{ matrix.arch }})
    needs: [prepare, verify-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.desktop_matrix) }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2t64 \
            libgbm-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            librsvg2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config \
            rpm \
            patchelf

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Sync bundled desktop components
        run: node scripts/run-desktop-release-build.mjs --profile ${{ inputs.release_profile }} --phase sync --target ${{ matrix.target }} --release

      - name: Clean stale Tauri target cache
        run: node scripts/run-desktop-release-build.mjs --profile ${{ inputs.release_profile }} --phase prepare-target --target ${{ matrix.target }}

      - name: Prepare bundled OpenClaw runtime
        run: node scripts/run-desktop-release-build.mjs --profile ${{ inputs.release_profile }} --phase prepare-openclaw --target ${{ matrix.target }}

      - name: Build Claw Studio desktop bundle on Windows
        if: matrix.platform == 'windows'
        env:
          CMAKE_GENERATOR: Visual Studio 17 2022
          HOST_CMAKE_GENERATOR: Visual Studio 17 2022
        run: node scripts/run-desktop-release-build.mjs --profile ${{ inputs.release_profile }} --phase bundle --target ${{ matrix.target }}

      - name: Build Claw Studio desktop bundle on Unix
        if: matrix.platform != 'windows'
        run: node scripts/run-desktop-release-build.mjs --profile ${{ inputs.release_profile }} --phase bundle --target ${{ matrix.target }}

      - name: Collect desktop release assets
        run: node scripts/release/package-release-assets.mjs desktop --profile ${{ inputs.release_profile }} --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --target ${{ matrix.target }} --output-dir artifacts/release

      - name: Attest desktop release assets
        if: ${{ needs.prepare.outputs.release_tag != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release/**/*

      - name: Upload desktop release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/release/**/*
          if-no-files-found: error

  web-release:
    name: Web and docs release assets
    needs: [prepare, verify-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Build web and docs
        shell: bash
        run: |
          pnpm build
          pnpm docs:build

      - name: Package web release assets
        run: node scripts/release/package-release-assets.mjs web --profile ${{ inputs.release_profile }} --release-tag ${{ needs.prepare.outputs.release_tag }} --output-dir artifacts/release

      - name: Attest web release assets
        if: ${{ needs.prepare.outputs.release_tag != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release/**/*

      - name: Upload web release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-web
          path: artifacts/release/**/*
          if-no-files-found: error

  server-release:
    name: Server release (${{ matrix.platform }}-${{ matrix.arch }})
    needs: [prepare, verify-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.server_matrix) }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Build web bundle for server assets
        run: pnpm build

      - name: Build server binary
        run: node scripts/run-claw-server-build.mjs --target ${{ matrix.target }}

      - name: Package server release assets
        run: node scripts/release/package-release-assets.mjs server --profile ${{ inputs.release_profile }} --release-tag ${{ needs.prepare.outputs.release_tag }} --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --target ${{ matrix.target }} --output-dir artifacts/release

      - name: Attest server release assets
        if: ${{ needs.prepare.outputs.release_tag != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release/**/*

      - name: Upload server release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-server-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/release/**/*
          if-no-files-found: error

  container-release:
    name: Container release (${{ matrix.arch }}-${{ matrix.accelerator }})
    needs: [prepare, verify-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.container_matrix) }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared SDK packages
        run: pnpm prepare:shared-sdk

      - name: Build web bundle for container assets
        run: pnpm build

      - name: Build server binary
        run: node scripts/run-claw-server-build.mjs --target ${{ matrix.target }}

      - name: Package container release assets
        run: node scripts/release/package-release-assets.mjs container --profile ${{ inputs.release_profile }} --release-tag ${{ needs.prepare.outputs.release_tag }} --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --target ${{ matrix.target }} --accelerator ${{ matrix.accelerator }} --output-dir artifacts/release

      - name: Attest container release assets
        if: ${{ needs.prepare.outputs.release_tag != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release/**/*

      - name: Upload container release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-container-${{ matrix.arch }}-${{ matrix.accelerator }}
          path: artifacts/release/**/*
          if-no-files-found: error

  kubernetes-release:
    name: Kubernetes release (${{ matrix.arch }}-${{ matrix.accelerator }})
    needs: [prepare, verify-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.kubernetes_matrix) }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Package kubernetes release assets
        run: node scripts/release/package-release-assets.mjs kubernetes --profile ${{ inputs.release_profile }} --release-tag ${{ needs.prepare.outputs.release_tag }} --platform ${{ matrix.platform }} --arch ${{ matrix.arch }} --target ${{ matrix.target }} --accelerator ${{ matrix.accelerator }} --output-dir artifacts/release

      - name: Attest kubernetes release assets
        if: ${{ needs.prepare.outputs.release_tag != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: artifacts/release/**/*

      - name: Upload kubernetes release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-kubernetes-${{ matrix.arch }}-${{ matrix.accelerator }}
          path: artifacts/release/**/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - verify-release
      - desktop-release
      - web-release
      - server-release
      - container-release
      - kubernetes-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.git_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Download packaged release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Finalize release assets
        run: node scripts/release/finalize-release-assets.mjs --profile ${{ inputs.release_profile }} --release-tag ${{ needs.prepare.outputs.release_tag }} --repository ${{ github.repository }} --release-assets-dir release-assets

      - name: Attest finalized release assets
        if: ${{ needs.prepare.outputs.release_tag != '' }}
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: release-assets/**/*

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/*
