name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  SDKWORK_SHARED_SDK_MODE: git
  SDKWORK_SHARED_SDK_GIT_REF: main
  SDKWORK_SHARED_SDK_APP_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-sdk-app.git
  SDKWORK_SHARED_SDK_COMMON_REPO_URL: https://github.com/Sdkwork-Cloud/sdkwork-sdk-commons.git

jobs:
  workspace-verify:
    name: Workspace verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            file \
            libfuse2t64 \
            libgbm-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            libpipewire-0.3-dev \
            libssl-dev \
            librsvg2-dev \
            rpm \
            patchelf

      - name: Prepare git-backed shared SDK sources
        run: node scripts/prepare-shared-sdk-git-sources.mjs

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace lint and parity checks
        run: pnpm lint

      - name: Run desktop contract checks
        run: pnpm check:desktop

      - name: Run Rust desktop tests
        run: cargo test --manifest-path packages/sdkwork-claw-desktop/src-tauri/Cargo.toml

      - name: Build web workspace
        run: pnpm build

      - name: Build docs site
        run: pnpm docs:build

  desktop-rust-windows:
    name: Desktop Rust tests (windows)
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Windows desktop Rust tests
        run: cargo test --manifest-path packages/sdkwork-claw-desktop/src-tauri/Cargo.toml
